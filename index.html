<!DOCTYPE html>
<html>
<head>
    <meta name="referrer" content="no-referrer-when-downgrade">
    <meta name="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
    <title>Tuneflix Login</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style type="text/css">
        #commentInput {
            width: 70%;
            margin-bottom: 10px;
        }
        #commentButton {
            margin-bottom: 10px;
        }
        #commentContainer {
            margin-bottom: 20px;
        }
        #commentContainer .image img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            margin-right: 5px;
        }
        #commentContainer .username {
            font-weight: bold;
        }
    </style>
</head>
<body>
<div>
    <div id="g_id_onload"
         data-client_id="1077614564692-et69ov65f2276o3l65mhbgfv9q6uni6v"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="gloginResponse"
         data-auto_prompt="false">
    </div>

    <div class="g_id_signin"
         data-type="standard"
         data-shape="rectangular"
         data-theme="outline"
         data-text="signin_with"
         data-size="large"
         data-logo_alignment="left">
    </div>

    <div id="profile">
        <div class="image" id="img"></div>
        <div class="username" id="username"></div>
    </div>
</div>

<div id="commentContainer">
    <input type="text" id="commentInput" placeholder="Write a comment...">
    <button onclick="postComment()" id="commentButton">Post Comment</button>
</div>

<script>

    function gloginResponse(response) {
        decodeJwtResponse(response.credential);
    }

    function decodeJwtResponse(data){
        //console.log(parseJwt(data))
        signIn(parseJwt(data))
    }

    function parseJwt (token) {
        var base64Url = token.split('.')[1];
        var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));

        return JSON.parse(jsonPayload);
    }

    function signIn(data){

        let img=document.getElementById('img');
        let username=document.getElementById('username');

        img.innerHTML="<img src=\'" + data.picture + "\'>";
        username.innerHTML=data.name;

        let loginbtn=document.getElementsByClassName('g_id_signin')[0];
        loginbtn.style.display='none';
    }

    function postComment() {
        const input = document.getElementById("commentInput");
        const comment = input.value.trim();
        if (comment === "") {
            alert("Please enter a comment.");
            return;
        }

        const commentContainer = document.getElementById("commentContainer");

        const commentDiv = document.createElement("div");
        commentDiv.classList.add("comment");
        commentDiv.innerHTML = `
            <div class="image">
                <img src="${document.getElementById('img').querySelector('img').src}" alt="Profile Picture">
            </div>
            <div class="content">
                <div class="username">${document.getElementById('username').textContent}</div>
                <div class="text">${comment}</div>
            </div>
        `;
        commentContainer.insertAdjacentElement("afterend", commentDiv);

        input.value = "";
    }

</script>
</body>
</html>
