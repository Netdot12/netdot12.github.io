<!DOCTYPE html>

<html>

<head>

	<meta name="referrer" content="no-referrer-when-downgrade">

	<meta name="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">

	<title>Tuneflix Login</title>

	<script src="https://accounts.google.com/gsi/client" async defer></script>

	<style type="text/css">

		

	</style>

</head>

<body>
<h1>the code</h1>
<div>

	<div id="g_id_onload"

	     data-client_id="847644538886-h57vcktcmjhdlj553b33js8tnenlge62"

	     data-context="signin"

	     data-ux_mode="popup"

	     data-callback="gloginResponse"

	     data-auto_prompt="false">

	</div>



	<div class="g_id_signin"

	     data-type="standard"

	     data-shape="rectangular"

	     data-theme="outline"

	     data-text="signin_with"

	     data-size="large"

	     data-logo_alignment="left">

	</div>



	<div id="profile">

		<div class="image" id="img"></div>

		<div class="username" id="username"></div>

		<div class="email" id="email"></div>

	</div>

</div>

<script>



    function gloginResponse(response) {

	    decodeJwtResponse(response.credential);

	}



	function decodeJwtResponse(data){

	    //console.log(parseJwt(data))

	    signIn(parseJwt(data))

	}



	function parseJwt (token) {

	    var base64Url = token.split('.')[1];

	    var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');

	    var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {

	        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);

	    }).join(''));



	    return JSON.parse(jsonPayload);

	}



	function signIn(data){



		let img=document.getElementById('img');

		let username=document.getElementById('username');

		let email=document.getElementById('email');



		img.innerHTML="<img src=\'" + data.picture + "\'>";

		username.innerHTML=data.name;

		email.innerHTML=data.email;



		let loginbtn=document.getElementsByClassName('g_id_signin')[0];

		loginbtn.style.display='none';



	}



</script>

</body>

</html>
