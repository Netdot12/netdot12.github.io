<!DOCTYPE html>
<html>
<head>
    <meta name="referrer" content="no-referrer-when-downgrade">
    <meta name="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
    <title>Tuneflix Login</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style type="text/css">
        .comment {
            margin-bottom: 20px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
        }
        .comment .image {
            float: left;
            margin-right: 10px;
        }
        .comment .image img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }
        .comment .content {
            overflow: hidden;
        }
        .comment .username {
            font-weight: bold;
        }
    </style>
</head>
<body>
<div>
    <div id="g_id_onload"
         data-client_id="1077614564692-et69ov65f2276o3l65mhbgfv9q6uni6v"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="gloginResponse"
         data-auto_prompt="false">
    </div>

    <div class="g_id_signin"
         data-type="standard"
         data-shape="rectangular"
         data-theme="outline"
         data-text="signin_with"
         data-size="large"
         data-logo_alignment="left">
    </div>

    <div id="profile">
        <div class="image" id="img"></div>
        <div class="username" id="username"></div>
        <div class="email" id="email"></div>
    </div>
</div>

<div id="comments">
    <!-- Comment section will be added here -->
</div>

<script>

    function gloginResponse(response) {
        decodeJwtResponse(response.credential);
    }

    function decodeJwtResponse(data){
        //console.log(parseJwt(data))
        signIn(parseJwt(data))
    }

    function parseJwt (token) {
        var base64Url = token.split('.')[1];
        var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));

        return JSON.parse(jsonPayload);
    }

    function signIn(data){

        let img=document.getElementById('img');
        let username=document.getElementById('username');
        let email=document.getElementById('email');

        img.innerHTML="<img src=\'" + data.picture + "\'>";
        username.innerHTML=data.name;
        email.innerHTML=data.email;

        let loginbtn=document.getElementsByClassName('g_id_signin')[0];
        loginbtn.style.display='none';

        // Simulated comments
        const comments = [
            { name: "John Doe", picture: "https://via.placeholder.com/50" },
            { name: "Jane Smith", picture: "https://via.placeholder.com/50" },
            { name: "Alice Johnson", picture: "https://via.placeholder.com/50" }
        ];

        const commentsContainer = document.getElementById("comments");
        comments.forEach(comment => {
            const commentDiv = document.createElement("div");
            commentDiv.classList.add("comment");
            commentDiv.innerHTML = `
                <div class="image">
                    <img src="${comment.picture}" alt="Profile Picture">
                </div>
                <div class="content">
                    <div class="username">${comment.name}</div>
                    <div class="text">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</div>
                </div>
            `;
            commentsContainer.appendChild(commentDiv);
        });
    }

</script>
</body>
</html>
