<!DOCTYPE html>
<html lang="en">
<head>
    <title>Google Sign-In Test</title>
    <!-- Include the Google Sign-In library -->
    <script src="https://apis.google.com/js/api.js"></script>
    <!-- Specify the OAuth client ID -->
    <meta name="google-signin-client_id" content="653692805628-6phs8eh9iusc15k12qd2kkjp69rodllc.apps.googleusercontent.com">
</head>
<body>
<div class="g-signin2" data-onsuccess="onSignIn"></div>
  
<a href="#" onclick="signOut();">Sign out</a>

<script>
  function signOut() {
    var auth2 = gapi.auth2.getAuthInstance();
    auth2.signOut().then(function () {
      console.log('User signed out.');
    });
  }

  function onSignIn(googleUser) {
    var profile = googleUser.getBasicProfile();
    console.log('ID: ' + profile.getId());
    console.log('Name: ' + profile.getName());
    console.log('Image URL: ' + profile.getImageUrl());
    console.log('Email: ' + profile.getEmail());

    // Show alert box and text based on sign-in status
    if (profile.getId()) {
      alert('Sign-in successful!');
      document.getElementById('status').innerHTML = 'Signed in as: ' + profile.getName();
    } else {
      alert('Sign-in failed!');
      document.getElementById('status').innerHTML = 'Sign-in failed!';
    }
  }

  // Initialize Google API client library
  function init() {
    gapi.load('auth2', function() {
      gapi.auth2.init();
    });
  }
  // Call init function when the page loads
  init();
</script>

<p id="status"></p>

</body>
</html>
